name: Build UACME Solution

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    # 1. Клонируем репозиторий
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Настраиваем MSBuild
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # 3. Компилируем модули-полезные нагрузки через файл решения (.sln), используя SelectedTargets
    # Это решает проблему путей включения (Include Paths) и обходит вложенные папки NanoDesu
    - name: Compile payload units
      run: |
        msbuild Source/uacme.sln -p:SelectedTargets=Fubuki -p:Configuration=Release -p:Platform=x64 -p:PlatformToolset=v143 -p:WindowsTargetPlatformVersion=10.0
        msbuild Source/uacme.sln -p:SelectedTargets=Yuubari -p:Configuration=Release -p:Platform=x64 -p:PlatformToolset=v143 -p:WindowsTargetPlatformVersion=10.0
        msbuild Source/uacme.sln -p:SelectedTargets=Akatsuki -p:Configuration=Release -p:Platform=x64 -p:PlatformToolset=v143 -p:WindowsTargetPlatformVersion=10.0

    # 4. Компилируем модуль Naka через файл решения
    - name: Compile Naka module
      run: msbuild Source/uacme.sln -p:SelectedTargets=Naka -p:Configuration=Release -p:Platform=x64 -p:PlatformToolset=v143 -p:WindowsTargetPlatformVersion=10.0

    # 5. Шифрование и генерация секретных блобов
    - name: Encrypt payloads and generate secret blobs
      shell: pwsh
      run: |
        echo "Запуск шифрования через Naka..."
        # При необходимости раскомментируйте строку вызова Naka.exe:
        # & .\Source\output\x64\Release\Naka.exe

    # 6. Создание директории Akagi\Bin и копирование зависимостей
    - name: Move compiled units and secret blobs to Akagi Bin directory
      shell: pwsh
      run: |
        $binDir = "Source/Akagi/Bin"
        if (!(Test-Path $binDir)) {
            New-Item -ItemType Directory -Path $binDir -Force
        }
        echo "Перемещение файлов в $binDir..."
        # При сборке через .sln файлы складываются в единую корневую выходную папку Source/output/
        # Copy-Item -Path "Source/output/x64/Release/Fubuki.dll" -Destination "$binDir/"

    # 7. Финальная сборка основного модуля Akagi
    - name: Rebuild Akagi
      run: msbuild Source/uacme.sln -p:SelectedTargets=Akagi -p:Configuration=Release -p:Platform=x64 -p:PlatformToolset=v143 -p:WindowsTargetPlatformVersion=10.0

    # 8. Сохранение артефактов
    - name: Upload Compiled Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: UACME-Release-x64
        path: |
          Source/**/*
        if-no-files-found: warn
